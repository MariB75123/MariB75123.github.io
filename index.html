<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Retro TV Widget</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  height:100vh;
  overflow:hidden;
  font-family:'DM Mono', monospace;
  background: #000;
}

/* BACKGROUND IMAGE */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background: url("Wallpaper.jpeg") center/cover no-repeat;
  filter: brightness(0.55) contrast(1.1) saturate(1.2);
  transform: scale(1.05);
}

/* DARK OVERLAY FOR DEPTH */
body::after {
  content:'';
  position:fixed;
  inset:0;
  background: radial-gradient(circle at center,
    rgba(0,0,0,0.2),
    rgba(0,0,0,0.75));
  pointer-events:none;
}

/* HINT */
.hint {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:11px;
  letter-spacing:0.25em;
  color:rgba(255,200,230,0.35);
  transition:0.5s;
  z-index:10;
}
.hint.hidden { opacity:0; }

/* TV WRAPPER */
#tv {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:420px;
  cursor:grab;
  filter:
    drop-shadow(0 40px 80px rgba(0,0,0,0.6))
    drop-shadow(0 0 120px rgba(255,120,200,0.15));
}

#tv:active { cursor:grabbing; }

#tv.playing {
  filter:
    drop-shadow(0 40px 90px rgba(0,0,0,0.7))
    drop-shadow(0 0 140px rgba(255,120,200,0.35));
}

/* TV SVG BASE LAYER */
#tv svg {
  width:100%;
  height:auto;
  display:block;
  position:relative;
  z-index:2;
}

/* TV TEXTURE OVERLAY (TV2.png) */
#tv::after {
  content:'';
  position:absolute;
  inset:0;
  background:url("TV2.png") center/contain no-repeat;
  opacity:0.35;
  mix-blend-mode:overlay;
  pointer-events:none;
  z-index:3;
}

/* SCREEN VIDEO LAYER */
#screen-video {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-55%);
  width:42%;
  height:42%;
  border-radius:50%;
  overflow:hidden;
  z-index:1;
}

/* VIDEO */
video {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CRT EFFECT */
#screen-video::after {
  content:'';
  position:absolute;
  inset:0;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0.15),
      rgba(0,0,0,0.15) 1px,
      transparent 2px,
      transparent 4px
    );
  pointer-events:none;
  opacity:0.35;
}

/* BUTTON */
#btn {
  position:absolute;
  bottom:18%;
  left:50%;
  transform:translateX(-50%);
  width:38px;
  height:38px;
  border-radius:50%;
  background: radial-gradient(circle at 30% 30%, #ffb3df, #7a2b60);
  box-shadow:
    0 5px 10px rgba(0,0,0,0.5),
    inset 0 2px 6px rgba(255,255,255,0.2);
  cursor:pointer;
  z-index:5;
}

#btn:active {
  transform:translateX(-50%) translateY(2px);
}

/* IDLE STATE TEXT */
#idle {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:rgba(255,180,220,0.4);
  font-size:12px;
  letter-spacing:0.3em;
  z-index:2;
  pointer-events:none;
}

.hidden { opacity:0; }

</style>
</head>

<body>

<div class="hint" id="hint">drag tv · click button to play</div>

<div id="tv">

  <!-- SCREEN VIDEO -->
  <div id="screen-video">
    <video id="vid" loop playsinline preload="auto">
      <source src="The Powerpuff Girls.mp4" type="video/mp4">
    </video>

    <div id="idle">NO SIGNAL</div>
  </div>

  <!-- TV BODY SVG -->
  <object type="image/svg+xml" data="TV.svg"></object>

  <!-- BUTTON -->
  <div id="btn"></div>

</div>

<script>
const tv = document.getElementById('tv');
const vid = document.getElementById('vid');
const btn = document.getElementById('btn');
const idle = document.getElementById('idle');
const hint = document.getElementById('hint');

let playing = false;

/* PLAY / PAUSE */
async function toggle() {

  if (!playing) {
    try {
      await vid.play(); // sound allowed (user gesture)
      playing = true;

      idle.classList.add('hidden');
      tv.classList.add('playing');

    } catch(e) {
      console.log("Playback blocked:", e);
    }

  } else {
    vid.pause();
    playing = false;

    idle.classList.remove('hidden');
    tv.classList.remove('playing');
  }
}

/* BUTTON */
btn.addEventListener('click', toggle);

/* DRAG */
let dragging = false;
let offsetX, offsetY;

let x = window.innerWidth/2;
let y = window.innerHeight/2;

function setPos(nx, ny) {
  x = nx; y = ny;
  tv.style.left = x + 'px';
  tv.style.top = y + 'px';
  tv.style.transform = 'translate(-50%,-50%)';
}

setPos(x,y);

tv.addEventListener('mousedown', e => {
  if (e.target === btn) return;
  dragging = true;
  offsetX = e.clientX - x;
  offsetY = e.clientY - y;
});

window.addEventListener('mousemove', e => {
  if (!dragging) return;
  setPos(e.clientX - offsetX, e.clientY - offsetY);
  hint.classList.add('hidden');
});

window.addEventListener('mouseup', () => dragging = false);

/* TOUCH */
tv.addEventListener('touchstart', e => {
  if (e.target === btn) return;
  const t = e.touches[0];
  dragging = true;
  offsetX = t.clientX - x;
  offsetY = t.clientY - y;
},{passive:false});

window.addEventListener('touchmove', e => {
  if (!dragging) return;
  const t = e.touches[0];
  setPos(t.clientX - offsetX, t.clientY - offsetY);
},{passive:false});

window.addEventListener('touchend', () => dragging = false);

/* HINT FADE */
setTimeout(()=> hint.classList.add('hidden'), 4000);

</script>

</body>
</html>
