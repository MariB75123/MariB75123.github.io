<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Widget</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: url("Wallpaper.jpeg") center center / cover no-repeat fixed;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'DM Mono', monospace;
    cursor: default;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(200,120,180,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,120,180,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .hint {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%);
    color: rgba(200,140,180,0.4);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    pointer-events: none;
    transition: opacity 0.6s;
    z-index: 100;
  }
  .hint.hidden { opacity: 0; }

  /* BIGGER TV */
  #tv {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 520px;
    cursor: grab;
    filter: drop-shadow(0 30px 60px rgba(90,20,70,0.7))
            drop-shadow(0 0 80px rgba(180,90,150,0.2));
    transition: filter 0.2s;
  }

  #tv:active { cursor: grabbing; }

  #tv.playing {
    filter: drop-shadow(0 30px 60px rgba(90,20,70,0.7))
            drop-shadow(0 0 100px rgba(220,120,180,0.45));
  }

  #tv svg { width: 100%; height: auto; overflow: visible; }

  .stand-shape { fill: url(#grad-stand); stroke: #7c3d6a; stroke-width: 1.5; filter: url(#shadow-stand); }
  .case-ring   { fill: url(#grad-case);  stroke: #7c3d6a; stroke-width: 1.5; filter: url(#bevel-case); }
  .bezel-shape { fill: url(#grad-bezel); stroke: rgba(80,30,70,0.5); stroke-width: 1; filter: url(#inner-shadow-bezel); }
  .screen-bg   { fill: url(#grad-screen); }
  .deco-line   { fill: none; stroke: rgba(80,30,65,0.55); stroke-width: 1.5; stroke-linecap: round; }
  .btn-bg      { fill: url(#grad-btn-bg); stroke: #7c3d6a; stroke-width: 1; filter: url(#shadow-btn); cursor: pointer; }
  .btn-inner   { fill: url(#grad-btn); stroke: rgba(40,10,50,0.6); stroke-width: 1; cursor: pointer; }
  .btn-inner:hover { filter: brightness(1.25); }
  .btn-inner.on { fill: url(#grad-btn-on); filter: drop-shadow(0 0 6px rgba(255,160,220,0.9)); }
  .screen-click { fill: transparent; cursor: pointer; }

  @keyframes blink {
    0%,90%,100% { transform: scaleY(1); }
    95% { transform: scaleY(0.08); }
  }
  .idle-blink {
    animation: blink 4s ease-in-out infinite;
    transform-box: fill-box;
    transform-origin: center;
  }
</style>
</head>

<body>

<div class="hint" id="hint">drag me anywhere · click screen or button to play</div>

<div id="tv">
<svg viewBox="0 0 629.36 592.79" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip-screen">
      <circle cx="305.41" cy="236.55" r="101.78"/>
    </clipPath>
  </defs>

  <!-- SCREEN -->
  <circle class="screen-bg" cx="305.41" cy="236.55" r="101.78"/>

  <!-- VIDEO -->
  <foreignObject id="video-fo" x="203.63" y="134.77" width="203.56" height="203.56"
    clip-path="url(#clip-screen)" opacity="0">
    <video id="vid"
      style="width:100%;height:100%;object-fit:cover;display:block;"
      loop muted playsinline>
      <source src="https://raw.githubusercontent.com/MariB75123/MariB75123.github.io/main/The%20Powerpuff%20Girls.mp4"
      type="video/mp4"/>
    </video>
  </foreignObject>

  <!-- IDLE -->
  <g id="idle-group" clip-path="url(#clip-screen)">
    <circle cx="305.41" cy="236.55" r="101.78" fill="url(#grad-screen)"/>
    <text x="305.41" y="264" text-anchor="middle"
      font-size="9" fill="rgba(200,130,170,0.45)">NO SIGNAL</text>
  </g>

  <!-- CLICK TARGET -->
  <circle class="screen-click" id="screen-click"
    cx="305.41" cy="236.55" r="101.78"/>

  <!-- BUTTON -->
  <ellipse class="btn-bg" cx="306.87" cy="472.68" rx="22.24" ry="15.41"/>
  <ellipse class="btn-inner" id="btn-inner"
    cx="306.87" cy="472.68" rx="15.29" ry="10.6"/>
</svg>
</div>

<script>
const tv = document.getElementById('tv');
const screenClick = document.getElementById('screen-click');
const btnInner = document.getElementById('btn-inner');
const btnBg = tv.querySelector('.btn-bg');
const vid = document.getElementById('vid');
const videoFO = document.getElementById('video-fo');
const idleGroup = document.getElementById('idle-group');

let isPlaying = false;

function togglePlay() {
  isPlaying = !isPlaying;

  if (isPlaying) {
    vid.play().catch(()=>{});
    videoFO.style.opacity = '1';
    idleGroup.style.opacity = '0';
    btnInner.classList.add('on');
    tv.classList.add('playing');
  } else {
    vid.pause();
    videoFO.style.opacity = '0';
    idleGroup.style.opacity = '1';
    btnInner.classList.remove('on');
    tv.classList.remove('playing');
  }
}

screenClick.addEventListener('click', togglePlay);
btnInner.addEventListener('click', togglePlay);
btnBg.addEventListener('click', togglePlay);

/* DRAG */
let dragging = false, startX, startY;
let posX = window.innerWidth/2, posY = window.innerHeight/2;

function setPos(x,y){
  posX=x; posY=y;
  tv.style.left=x+'px';
  tv.style.top=y+'px';
}

setPos(posX,posY);

tv.addEventListener('mousedown', e=>{
  if ([screenClick, btnInner, btnBg].includes(e.target)) return;
  dragging=true;
  startX=e.clientX-posX;
  startY=e.clientY-posY;
});

window.addEventListener('mousemove', e=>{
  if(!dragging) return;
  setPos(e.clientX-startX, e.clientY-startY);
});

window.addEventListener('mouseup', ()=>dragging=false);
</script>

</body>
</html>
