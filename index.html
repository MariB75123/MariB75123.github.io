<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rainy River</title>

<style>
    html, body {
        margin: 0;
        overflow: hidden;
        background: #1e293b;
        height: 100%;
        font-family: sans-serif;
    }

    canvas {
        display: block;
    }

    .title {
        position: absolute;
        top: 30px;
        width: 100%;
        text-align: center;
        color: rgba(255,255,255,0.92);
        font-size: 2rem;
        letter-spacing: 4px;
        pointer-events: none;
        text-shadow: 0 0 25px rgba(255,255,255,0.5);
    }
</style>
</head>
<body>

<div class="title">RAIN OVER THE RIVER</div>
<canvas id="scene"></canvas>

<script>
const canvas = document.getElementById("scene");
const ctx = canvas.getContext("2d");

let w, h;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const rain = [];
const ripples = [];
const stars = [];

// PREGENERATED mountain points so background stays stable
const mountainPoints = [];

function generateMountains() {
    mountainPoints.length = 0;

    for (let x = 0; x <= w + 120; x += 120) {
        mountainPoints.push({
            x,
            y: h * 0.32 + Math.random() * 90
        });
    }
}

generateMountains();

window.addEventListener("resize", () => {
    resize();
    generateMountains();
});

for (let i = 0; i < 700; i++) {
    rain.push({
        x: Math.random() * w,
        y: Math.random() * h,
        len: 10 + Math.random() * 20,
        speed: 8 + Math.random() * 12,
        opacity: 0.2 + Math.random() * 0.5
    });
}

for (let i = 0; i < 100; i++) {
    stars.push({
        x: Math.random() * w,
        y: Math.random() * h * 0.5,
        r: Math.random() * 2,
        a: 0.2 + Math.random() * 0.6
    });
}

function drawSky() {
    const grad = ctx.createLinearGradient(0, 0, 0, h);

    // BRIGHTER SKY
    grad.addColorStop(0, "#334155");
    grad.addColorStop(0.5, "#475569");
    grad.addColorStop(1, "#64748b");

    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    // brighter moon glow
    const moonGlow = ctx.createRadialGradient(
        w * 0.75,
        h * 0.2,
        0,
        w * 0.75,
        h * 0.2,
        350
    );

    moonGlow.addColorStop(0, "rgba(255,255,255,0.18)");
    moonGlow.addColorStop(1, "rgba(255,255,255,0)");

    ctx.fillStyle = moonGlow;
    ctx.fillRect(0, 0, w, h);

    // stars
    for (const s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.a})`;
        ctx.fill();
    }
}

function drawMountains() {
    ctx.fillStyle = "#1e293b";

    ctx.beginPath();
    ctx.moveTo(0, h * 0.55);

    // USE FIXED POINTS (no shaking)
    for (const p of mountainPoints) {
        ctx.lineTo(p.x, p.y);
    }

    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fill();
}

function drawRiver(time) {
    const riverTop = h * 0.6;

    const grad = ctx.createLinearGradient(0, riverTop, 0, h);

    // brighter river
    grad.addColorStop(0, "#3b82f6");
    grad.addColorStop(1, "#0f172a");

    ctx.fillStyle = grad;

    ctx.beginPath();
    ctx.moveTo(0, riverTop);

    for (let x = 0; x <= w; x += 20) {
        const wave =
            Math.sin(x * 0.01 + time * 0.0015) * 8 +
            Math.sin(x * 0.02 + time * 0.001) * 5;

        ctx.lineTo(x, riverTop + wave);
    }

    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fill();

    // brighter reflections
    for (let i = 0; i < 50; i++) {
        const x = (i / 50) * w;
        const y =
            riverTop +
            Math.sin(x * 0.01 + time * 0.0015) * 8;

        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.fillRect(x, y + 20, 90, 2);
    }
}

function createRipple(x, y) {
    ripples.push({
        x,
        y,
        r: 1,
        alpha: 0.35
    });
}

function updateRain() {
    ctx.lineWidth = 1.2;

    for (const drop of rain) {
        ctx.beginPath();
        ctx.moveTo(drop.x, drop.y);
        ctx.lineTo(drop.x - 4, drop.y + drop.len);

        ctx.strokeStyle = `rgba(200,230,255,${drop.opacity})`;
        ctx.stroke();

        drop.x -= 1;
        drop.y += drop.speed;

        if (drop.y > h) {
            if (drop.y > h * 0.6) {
                createRipple(
                    drop.x,
                    h * 0.6 + Math.random() * (h * 0.4)
                );
            }

            drop.y = -20;
            drop.x = Math.random() * w;
        }

        if (drop.x < -20) {
            drop.x = w + 20;
        }
    }
}

function updateRipples() {
    for (let i = ripples.length - 1; i >= 0; i--) {
        const r = ripples[i];

        ctx.beginPath();
        ctx.ellipse(r.x, r.y, r.r * 2, r.r, 0, 0, Math.PI * 2);

        ctx.strokeStyle = `rgba(220,240,255,${r.alpha})`;
        ctx.lineWidth = 1;
        ctx.stroke();

        r.r += 0.5;
        r.alpha -= 0.005;

        if (r.alpha <= 0) {
            ripples.splice(i, 1);
        }
    }
}

// softer lightning
function lightning(time) {
    const pulse = Math.sin(time * 0.002);

    if (pulse > 0.996) {
        ctx.fillStyle = `rgba(255,255,255,${(pulse - 0.996) * 10})`;
        ctx.fillRect(0, 0, w, h);
    }
}

function animate(time) {
    ctx.clearRect(0, 0, w, h);

    drawSky();
    drawMountains();
    drawRiver(time);

    updateRipples();
    updateRain();

    lightning(time);

    requestAnimationFrame(animate);
}

animate(0);
</script>

</body>
</html><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daytime River</title>

<style>
    html, body {
        margin: 0;
        overflow: hidden;
        height: 100%;
        background: #87ceeb;
        font-family: Arial, sans-serif;
    }

    canvas {
        display: block;
    }

    .title {
        position: absolute;
        top: 30px;
        width: 100%;
        text-align: center;
        color: rgba(255,255,255,0.9);
        font-size: 2rem;
        letter-spacing: 6px;
        pointer-events: none;
        text-shadow:
            0 0 10px rgba(255,255,255,0.8),
            0 0 30px rgba(255,255,255,0.5);
    }
</style>
</head>
<body>

<div class="title">DAYLIGHT OVER THE RIVER</div>
<canvas id="scene"></canvas>

<script>
const canvas = document.getElementById("scene");
const ctx = canvas.getContext("2d");

let w, h;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;

    generateMountains();
    generateTrees();
    generateClouds();
}

window.addEventListener("resize", resize);

// -------------------------
// SCENE OBJECTS
// -------------------------

const rain = [];
const ripples = [];
const clouds = [];
const mountainPoints = [];
const trees = [];

// -------------------------
// GENERATORS
// -------------------------

function generateMountains() {
    mountainPoints.length = 0;

    for (let x = -100; x <= w + 200; x += 120) {
        mountainPoints.push({
            x,
            y: h * 0.25 + Math.random() * 120
        });
    }
}

function generateTrees() {
    trees.length = 0;

    for (let i = 0; i < 80; i++) {
        trees.push({
            x: Math.random() * w,
            size: 20 + Math.random() * 40,
            y: h * 0.58 + Math.random() * 70
        });
    }
}

function generateClouds() {
    clouds.length = 0;

    for (let i = 0; i < 12; i++) {
        clouds.push({
            x: Math.random() * w,
            y: Math.random() * h * 0.3,
            size: 50 + Math.random() * 90,
            speed: 0.1 + Math.random() * 0.3
        });
    }
}

resize();

// -------------------------
// RAIN
// -------------------------

for (let i = 0; i < 500; i++) {
    rain.push({
        x: Math.random() * w,
        y: Math.random() * h,
        len: 8 + Math.random() * 18,
        speed: 7 + Math.random() * 10,
        opacity: 0.08 + Math.random() * 0.2
    });
}

// -------------------------
// DRAW SKY
// -------------------------

function drawSky() {

    // Bright daytime gradient
    const sky = ctx.createLinearGradient(0, 0, 0, h);

    sky.addColorStop(0, "#7dd3fc");
    sky.addColorStop(0.45, "#bae6fd");
    sky.addColorStop(1, "#e0f2fe");

    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, w, h);

    // Sun glow
    const sunGlow = ctx.createRadialGradient(
        w * 0.8,
        h * 0.18,
        20,
        w * 0.8,
        h * 0.18,
        180
    );

    sunGlow.addColorStop(0, "rgba(255,255,200,0.95)");
    sunGlow.addColorStop(0.4, "rgba(255,240,150,0.45)");
    sunGlow.addColorStop(1, "rgba(255,255,255,0)");

    ctx.fillStyle = sunGlow;
    ctx.fillRect(0, 0, w, h);

    // Sun
    ctx.beginPath();
    ctx.arc(w * 0.8, h * 0.18, 50, 0, Math.PI * 2);

    const sun = ctx.createRadialGradient(
        w * 0.8,
        h * 0.18,
        0,
        w * 0.8,
        h * 0.18,
        50
    );

    sun.addColorStop(0, "#fff7c2");
    sun.addColorStop(1, "#ffd54f");

    ctx.fillStyle = sun;
    ctx.fill();

    // Clouds
    for (const c of clouds) {

        ctx.fillStyle = "rgba(255,255,255,0.85)";

        for (let i = 0; i < 5; i++) {
            ctx.beginPath();

            ctx.arc(
                c.x + i * c.size * 0.25,
                c.y + Math.sin(i) * 10,
                c.size * (0.3 + Math.random() * 0.08),
                0,
                Math.PI * 2
            );

            ctx.fill();
        }

        c.x += c.speed;

        if (c.x > w + 200) {
            c.x = -200;
        }
    }
}

// -------------------------
// MOUNTAINS
// -------------------------

function drawMountains() {

    // back mountains
    ctx.beginPath();
    ctx.moveTo(0, h * 0.55);

    for (const p of mountainPoints) {
        ctx.lineTo(p.x, p.y);
    }

    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();

    const mountainGrad = ctx.createLinearGradient(0, 0, 0, h);

    mountainGrad.addColorStop(0, "#64748b");
    mountainGrad.addColorStop(1, "#334155");

    ctx.fillStyle = mountainGrad;
    ctx.fill();

    // front hills
    ctx.beginPath();
    ctx.moveTo(0, h * 0.65);

    for (let x = 0; x <= w; x += 40) {

        const y =
            h * 0.63 +
            Math.sin(x * 0.01) * 20 +
            Math.sin(x * 0.03) * 8;

        ctx.lineTo(x, y);
    }

    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();

    const hillGrad = ctx.createLinearGradient(0, h * 0.6, 0, h);

    hillGrad.addColorStop(0, "#22c55e");
    hillGrad.addColorStop(1, "#14532d");

    ctx.fillStyle = hillGrad;
    ctx.fill();
}

// -------------------------
// TREES
// -------------------------

function drawTrees() {

    for (const t of trees) {

        // trunk
        ctx.fillStyle = "#5b3a29";
        ctx.fillRect(t.x, t.y, t.size * 0.12, t.size);

        // leaves
        const leaves = ctx.createRadialGradient(
            t.x,
            t.y,
            5,
            t.x,
            t.y,
            t.size
        );

        leaves.addColorStop(0, "#86efac");
        leaves.addColorStop(1, "#166534");

        ctx.beginPath();
        ctx.arc(
            t.x + t.size * 0.06,
            t.y,
            t.size * 0.55,
            0,
            Math.PI * 2
        );

        ctx.fillStyle = leaves;
        ctx.fill();
    }
}

// -------------------------
// RIVER
// -------------------------

function drawRiver(time) {

    const riverTop = h * 0.65;

    const river = ctx.createLinearGradient(
        0,
        riverTop,
        0,
        h
    );

    river.addColorStop(0, "#60a5fa");
    river.addColorStop(0.5, "#2563eb");
    river.addColorStop(1, "#1e3a8a");

    ctx.fillStyle = river;

    ctx.beginPath();
    ctx.moveTo(0, riverTop);

    for (let x = 0; x <= w; x += 20) {

        const wave =
            Math.sin(x * 0.01 + time * 0.0015) * 10 +
            Math.sin(x * 0.03 + time * 0.001) * 4;

        ctx.lineTo(x, riverTop + wave);
    }

    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fill();

    // Sparkles
    for (let i = 0; i < 80; i++) {

        const x = (i / 80) * w;

        const y =
            riverTop +
            Math.sin(x * 0.01 + time * 0.0015) * 10 +
            30 +
            Math.sin(time * 0.003 + i) * 5;

        ctx.fillStyle = "rgba(255,255,255,0.18)";
        ctx.fillRect(x, y, 40, 2);
    }
}

// -------------------------
// RIPPLES
// -------------------------

function createRipple(x, y) {
    ripples.push({
        x,
        y,
        r: 1,
        alpha: 0.18
    });
}

function updateRipples() {

    for (let i = ripples.length - 1; i >= 0; i--) {

        const r = ripples[i];

        ctx.beginPath();

        ctx.ellipse(
            r.x,
            r.y,
            r.r * 2,
            r.r,
            0,
            0,
            Math.PI * 2
        );

        ctx.strokeStyle =
            `rgba(255,255,255,${r.alpha})`;

        ctx.lineWidth = 1;
        ctx.stroke();

        r.r += 0.45;
        r.alpha -= 0.004;

        if (r.alpha <= 0) {
            ripples.splice(i, 1);
        }
    }
}

// -------------------------
// LIGHT RAIN
// -------------------------

function updateRain() {

    ctx.lineWidth = 1;

    for (const drop of rain) {

        ctx.beginPath();
        ctx.moveTo(drop.x, drop.y);
        ctx.lineTo(drop.x - 2, drop.y + drop.len);

        ctx.strokeStyle =
            `rgba(255,255,255,${drop.opacity})`;

        ctx.stroke();

        drop.x -= 0.3;
        drop.y += drop.speed;

        if (drop.y > h) {

            if (drop.y > h * 0.65) {

                createRipple(
                    drop.x,
                    h * 0.65 +
                    Math.random() * (h * 0.35)
                );
            }

            drop.y = -20;
            drop.x = Math.random() * w;
        }

        if (drop.x < -20) {
            drop.x = w + 20;
        }
    }
}

// -------------------------
// ANIMATION
// -------------------------

function animate(time) {

    ctx.clearRect(0, 0, w, h);

    drawSky();
    drawMountains();
    drawTrees();
    drawRiver(time);

    updateRipples();
    updateRain();

    requestAnimationFrame(animate);
}

animate(0);
</script>

</body>
</html>
