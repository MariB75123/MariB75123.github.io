<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Realistic Daytime River</title>

<style>
    html, body {
        margin: 0;
        overflow: hidden;
        height: 100%;
        background: #87ceeb;
        font-family: 'Segoe UI', Arial, sans-serif;
    }

    canvas {
        display: block;
    }

    .title {
        position: absolute;
        top: 30px;
        width: 100%;
        text-align: center;
        color: rgba(255,255,255,0.95);
        font-size: 2.4rem;
        letter-spacing: 8px;
        pointer-events: none;
        text-shadow: 
            0 2px 15px rgba(0,0,0,0.3),
            0 0 30px rgba(255,255,255,0.6);
        z-index: 10;
    }
</style>
</head>
<body>

<div class="title">SERENE RIVER VALLEY</div>
<canvas id="scene"></canvas>

<script>
const canvas = document.getElementById("scene");
const ctx = canvas.getContext("2d");

let w, h, time = 0;

const mountains = [];
const midMountains = [];
const trees = [];
const clouds = [];
const birds = [];
const ripples = [];

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    
    generateMountains();
    generateMidMountains();
    generateTrees();
    generateClouds();
    generateBirds();
}

window.addEventListener("resize", resize);

// ===================== GENERATORS =====================

function generateMountains() {
    mountains.length = 0;
    for (let x = -200; x <= w + 300; x += 110) {
        mountains.push({
            x,
            y: h * 0.22 + Math.random() * 90,
            height: 180 + Math.random() * 120
        });
    }
}

function generateMidMountains() {
    midMountains.length = 0;
    for (let x = -150; x <= w + 250; x += 75) {
        midMountains.push({
            x,
            y: h * 0.38 + Math.random() * 70,
            height: 140 + Math.random() * 80
        });
    }
}

function generateTrees() {
    trees.length = 0;
    for (let i = 0; i < 180; i++) {
        const size = 22 + Math.random() * 52;
        trees.push({
            x: Math.random() * w,
            y: h * 0.58 + Math.random() * 110,
            size: size,
            trunkHeight: size * 0.9,
            dark: Math.random() * 0.4 + 0.1,
            sway: Math.random() * Math.PI
        });
    }
}

function generateClouds() {
    clouds.length = 0;
    for (let i = 0; i < 12; i++) {
        clouds.push({
            x: Math.random() * w,
            y: h * 0.08 + Math.random() * h * 0.22,
            size: 90 + Math.random() * 180,
            speed: 0.06 + Math.random() * 0.14,
            opacity: 0.75 + Math.random() * 0.2
        });
    }
}

function generateBirds() {
    birds.length = 0;
    for (let i = 0; i < 10; i++) {
        birds.push({
            x: Math.random() * w,
            y: 60 + Math.random() * 220,
            size: 7 + Math.random() * 11,
            speed: 0.8 + Math.random() * 1.1,
            flap: Math.random() * Math.PI * 2
        });
    }
}

resize();

// ===================== DRAWING =====================

function drawSky() {
    const sky = ctx.createLinearGradient(0, 0, 0, h * 0.75);
    sky.addColorStop(0, "#6eb3ff");
    sky.addColorStop(0.4, "#a1d0ff");
    sky.addColorStop(0.7, "#c8e4ff");
    sky.addColorStop(1, "#e6f3ff");

    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, w, h);

    // Sun
    const sunX = w * 0.78;
    const sunY = h * 0.19;

    // Large soft glow
    const glow = ctx.createRadialGradient(sunX, sunY, 40, sunX, sunY, 320);
    glow.addColorStop(0, "rgba(255, 235, 180, 0.75)");
    glow.addColorStop(0.3, "rgba(255, 210, 120, 0.35)");
    glow.addColorStop(1, "rgba(255, 240, 180, 0)");

    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, w, h);

    // Sun body
    ctx.beginPath();
    ctx.arc(sunX, sunY, 58, 0, Math.PI * 2);
    ctx.fillStyle = "#fff9d4";
    ctx.fill();

    ctx.beginPath();
    ctx.arc(sunX, sunY, 48, 0, Math.PI * 2);
    ctx.fillStyle = "#ffeb9f";
    ctx.fill();
}

function drawClouds() {
    for (const c of clouds) {
        ctx.globalAlpha = c.opacity;
        const baseY = c.y;

        ctx.fillStyle = "#ffffff";

        for (let i = 0; i < 7; i++) {
            const px = c.x + i * c.size * 0.18;
            const py = baseY + Math.sin(i) * 12;
            const radius = c.size * (0.28 + Math.sin(i * 1.3) * 0.08);

            ctx.beginPath();
            ctx.ellipse(px, py, radius, radius * 0.65, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        c.x += c.speed;

        if (c.x > w + 400) c.x = -400;
    }
    ctx.globalAlpha = 1;
}

function drawBirds() {
    ctx.strokeStyle = "rgba(40, 45, 55, 0.65)";
    ctx.lineWidth = 2.2;

    for (const b of birds) {
        const flap = Math.sin(time * 0.008 + b.flap) * 6;

        ctx.beginPath();
        ctx.moveTo(b.x - b.size, b.y + flap);
        ctx.quadraticCurveTo(b.x - b.size * 0.4, b.y - 4, b.x + b.size, b.y + flap * 0.6);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(b.x + b.size * 1.8, b.y + flap * 0.7);
        ctx.quadraticCurveTo(b.x + b.size * 1.3, b.y - 3, b.x + b.size * 3, b.y + flap);
        ctx.stroke();

        b.x += b.speed;
        if (b.x > w + 80) b.x = -80;
    }
}

function drawMountains() {
    // Far mountains
    ctx.beginPath();
    ctx.moveTo(0, h * 0.65);
    for (const m of mountains) {
        ctx.lineTo(m.x, m.y);
    }
    ctx.lineTo(w, h * 0.68);
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();

    const grad = ctx.createLinearGradient(0, h*0.15, 0, h*0.65);
    grad.addColorStop(0, "#5a6b7a");
    grad.addColorStop(0.6, "#3f4a5c");
    grad.addColorStop(1, "#2c3444");

    ctx.fillStyle = grad;
    ctx.fill();

    // Snow caps
    ctx.beginPath();
    for (const m of mountains) {
        ctx.lineTo(m.x, m.y + 12);
        ctx.lineTo(m.x + 35, m.y - 28);
    }
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.fill();
}

function drawMidMountains() {
    ctx.beginPath();
    ctx.moveTo(0, h * 0.72);
    for (const m of midMountains) {
        ctx.lineTo(m.x, m.y);
    }
    ctx.lineTo(w, h * 0.75);
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();

    ctx.fillStyle = "#475569";
    ctx.fill();
}

function drawTrees() {
    for (const t of trees) {
        const sway = Math.sin(time * 0.0015 + t.sway) * 2.5;

        // Trunk
        ctx.fillStyle = "#3c2a1e";
        ctx.fillRect(t.x + sway * 0.3, t.y, t.size * 0.11, t.trunkHeight);

        // Foliage layers
        const colors = [
            `rgba(80, 175, 95, 1)`,
            `rgba(55, 155, 75, 1)`
        ];

        for (let i = 0; i < 4; i++) {
            const radius = t.size * (0.65 - i * 0.12);
            const yOffset = t.y - i * t.size * 0.35;

            ctx.beginPath();
            ctx.ellipse(
                t.x + t.size * 0.055 + sway * (0.6 - i * 0.1),
                yOffset,
                radius, 
                radius * 0.68,
                0, 0, Math.PI * 2
            );
            ctx.fillStyle = colors[i % 2];
            ctx.fill();
        }
    }
}

function drawRiver(time) {
    const top = h * 0.63;

    // Water base
    const riverGrad = ctx.createLinearGradient(0, top, 0, h);
    riverGrad.addColorStop(0, "#4a9cff");
    riverGrad.addColorStop(0.45, "#1e6fd1");
    riverGrad.addColorStop(1, "#0f2a5e");

    ctx.fillStyle = riverGrad;
    ctx.beginPath();
    ctx.moveTo(0, top);

    for (let x = 0; x <= w; x += 8) {
        const wave = 
            Math.sin(x * 0.006 + time * 0.0018) * 18 +
            Math.sin(x * 0.018 + time * 0.0032) * 8 +
            Math.sin(x * 0.04 + time * 0.0009) * 4;

        ctx.lineTo(x, top + wave);
    }

    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fill();

    // Sun reflection
    const refl = ctx.createLinearGradient(w * 0.68, top, w * 0.82, h);
    refl.addColorStop(0, "rgba(255, 245, 180, 0.45)");
    refl.addColorStop(0.4, "rgba(255, 235, 160, 0.25)");
    refl.addColorStop(1, "rgba(255, 255, 255, 0)");

    ctx.fillStyle = refl;
    ctx.beginPath();
    ctx.moveTo(w * 0.69, top);
    ctx.lineTo(w * 0.85, h);
    ctx.lineTo(w * 0.65, h);
    ctx.closePath();
    ctx.fill();

    // Sparkles
    ctx.fillStyle = "rgba(255,255,255,0.75)";
    for (let i = 0; i < 65; i++) {
        const x = Math.random() * w;
        const y = top + Math.random() * (h - top);
        const len = 25 + Math.random() * 55;
        ctx.fillRect(x, y, len, 1.1);
    }
}

function createRipple(x, y) {
    ripples.push({ x, y, r: 1, alpha: 0.22, speed: 1.1 });
}

function updateRipples() {
    for (let i = ripples.length - 1; i >= 0; i--) {
        const r = ripples[i];

        ctx.beginPath();
        ctx.ellipse(r.x, r.y, r.r * 2.4, r.r * 0.65, 0, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,255,255,${r.alpha})`;
        ctx.lineWidth = 1.8;
        ctx.stroke();

        r.r += r.speed;
        r.alpha -= 0.0035;
        r.speed *= 0.985;

        if (r.alpha <= 0) ripples.splice(i, 1);
    }
}

function generateAmbientRipples() {
    if (Math.random() < 0.28) {
        createRipple(
            Math.random() * w,
            h * 0.66 + Math.random() * (h * 0.32)
        );
    }
}

// ===================== ANIMATION =====================

function animate(t) {
    time = t;
    ctx.clearRect(0, 0, w, h);

    drawSky();
    drawClouds();
    drawBirds();
    drawMountains();
    drawMidMountains();
    drawTrees();
    drawRiver(time);

    generateAmbientRipples();
    updateRipples();

    requestAnimationFrame(animate);
}

animate(0);
</script>

</body>
</html>
