<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Powerpuff TV</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        user-select:none;
    }

    body{
        overflow:hidden;
        width:100vw;
        height:100vh;
        background:url("Wallpaper.jpeg") center center/cover no-repeat fixed;
        font-family:Arial, Helvetica, sans-serif;
    }

    /* TV CONTAINER */

    #tvContainer{
        position:absolute;
        width:700px;
        max-width:90vw;
        cursor:grab;
        left:50%;
        top:50%;
        transform:translate(-50%, -50%);
        z-index:10;
    }

    #tvContainer:active{
        cursor:grabbing;
    }

    /* VIDEO SCREEN */

    #videoWrapper{
        position:absolute;

        /* ADJUST THESE TO PERFECTLY FIT YOUR TV SCREEN */
        left:17.5%;
        top:16%;
        width:48%;
        height:42%;

        overflow:hidden;
        border-radius:50%;
        z-index:1;

        box-shadow:
            0 0 30px rgba(255,255,255,0.3),
            inset 0 0 20px rgba(255,255,255,0.2);
    }

    #tvVideo{
        width:100%;
        height:100%;
        object-fit:cover;
        filter:
            contrast(1.1)
            saturate(1.1)
            brightness(0.95);
    }

    /* TV FRAME IMAGE */

    #tvFrame{
        position:relative;
        width:100%;
        z-index:5;
        pointer-events:none;
        filter:
            drop-shadow(0 15px 30px rgba(0,0,0,0.5))
            drop-shadow(0 0 25px rgba(255,255,255,0.15));
    }

    /* SVG BUTTON LAYER */

    #svgButtons{
        position:absolute;
        inset:0;
        z-index:20;
        pointer-events:none;
    }

    .tvButton{
        position:absolute;
        border-radius:50%;
        cursor:pointer;
        pointer-events:auto;
        transition:0.2s;
    }

    .tvButton:hover{
        transform:scale(1.08);
        box-shadow:0 0 15px rgba(255,255,255,0.5);
    }

    .tvButton:active{
        transform:scale(0.95);
    }

    /* POWER BUTTON */

    #powerBtn{
        width:52px;
        height:52px;
        right:14%;
        top:38%;
    }

    /* PLAY/PAUSE */

    #playBtn{
        width:52px;
        height:52px;
        right:14%;
        top:50%;
    }

    /* CRT EFFECT */

    #crt{
        position:absolute;
        inset:0;
        pointer-events:none;
        z-index:50;
        mix-blend-mode:overlay;
        opacity:0.15;
        background:
            repeating-linear-gradient(
                to bottom,
                rgba(255,255,255,0.08),
                rgba(255,255,255,0.08) 1px,
                transparent 2px,
                transparent 4px
            );
    }

    /* TV FLOAT ANIMATION */

    @keyframes floatTV{
        0%{ transform:translate(-50%, -50%) translateY(0px); }
        50%{ transform:translate(-50%, -50%) translateY(-8px); }
        100%{ transform:translate(-50%, -50%) translateY(0px); }
    }

    #tvContainer{
        animation:floatTV 4s ease-in-out infinite;
    }

    /* MOBILE */

    @media(max-width:768px){

        #tvContainer{
            width:95vw;
        }

        #powerBtn,
        #playBtn{
            width:40px;
            height:40px;
        }
    }
</style>
</head>

<body>

<div id="tvContainer">

    <!-- VIDEO INSIDE TV -->
    <div id="videoWrapper">
        <video
            id="tvVideo"
            autoplay
            muted
            loop
            playsinline
        >
            <source src="The Powerpuff Girls.mp4" type="video/mp4">
        </video>
    </div>

    <!-- TV PNG -->
    <img id="tvFrame" src="TV.png" alt="TV">

    <!-- SVG BUTTON HIT AREAS -->
    <div id="svgButtons">

        <!-- POWER -->
        <div class="tvButton" id="powerBtn"></div>

        <!-- PLAY / PAUSE -->
        <div class="tvButton" id="playBtn"></div>

    </div>

    <!-- CRT -->
    <div id="crt"></div>

</div>

<script>
    const tv = document.getElementById("tvContainer");
    const video = document.getElementById("tvVideo");

    /* ----------------------------- */
    /* DRAGGABLE TV */
    /* ----------------------------- */

    let isDragging = false;
    let offsetX, offsetY;

    tv.addEventListener("mousedown", (e) => {

        isDragging = true;

        offsetX = e.clientX - tv.offsetLeft;
        offsetY = e.clientY - tv.offsetTop;

        tv.style.animation = "none";
    });

    document.addEventListener("mousemove", (e) => {

        if(!isDragging) return;

        tv.style.left = `${e.clientX - offsetX}px`;
        tv.style.top = `${e.clientY - offsetY}px`;
        tv.style.transform = "translate(0,0)";
    });

    document.addEventListener("mouseup", () => {
        isDragging = false;
    });

    /* TOUCH SUPPORT */

    tv.addEventListener("touchstart", (e) => {

        isDragging = true;

        offsetX = e.touches[0].clientX - tv.offsetLeft;
        offsetY = e.touches[0].clientY - tv.offsetTop;

        tv.style.animation = "none";

    }, { passive:true });

    document.addEventListener("touchmove", (e) => {

        if(!isDragging) return;

        tv.style.left = `${e.touches[0].clientX - offsetX}px`;
        tv.style.top = `${e.touches[0].clientY - offsetY}px`;
        tv.style.transform = "translate(0,0)";

    }, { passive:true });

    document.addEventListener("touchend", () => {
        isDragging = false;
    });

    /* ----------------------------- */
    /* POWER BUTTON */
    /* ----------------------------- */

    const powerBtn = document.getElementById("powerBtn");

    let powerOn = true;

    powerBtn.addEventListener("click", () => {

        powerOn = !powerOn;

        if(powerOn){

            video.style.opacity = "1";
            video.play();

            document.getElementById("videoWrapper").style.boxShadow =
                "0 0 30px rgba(255,255,255,0.3), inset 0 0 20px rgba(255,255,255,0.2)";

        } else {

            video.pause();

            video.style.opacity = "0";

            document.getElementById("videoWrapper").style.boxShadow =
                "0 0 5px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,1)";
        }
    });

    /* ----------------------------- */
    /* PLAY / PAUSE BUTTON */
    /* ----------------------------- */

    const playBtn = document.getElementById("playBtn");

    playBtn.addEventListener("click", () => {

        if(video.paused){
            video.play();
        } else {
            video.pause();
        }
    });

</script>

</body>
</html>
