<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Widget</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#0e0a12;
  height:100vh;
  overflow:hidden;
  font-family:'DM Mono', monospace;
  user-select:none;
}

/* GRID BACKGROUND */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(200,120,180,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,120,180,0.04) 1px, transparent 1px);
  background-size:40px 40px;
}

/* HINT */
.hint {
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  font-size:11px;
  letter-spacing:0.2em;
  color:rgba(200,140,180,0.4);
  transition:0.5s;
}
.hint.hidden { opacity:0; }

/* TV WRAPPER */
#tv {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:340px;
  cursor:grab;
  filter:
    drop-shadow(0 30px 60px rgba(90,20,70,0.7))
    drop-shadow(0 0 90px rgba(180,90,150,0.2));
}

#tv:active { cursor:grabbing; }

#tv.playing {
  filter:
    drop-shadow(0 30px 60px rgba(90,20,70,0.7))
    drop-shadow(0 0 130px rgba(255,120,200,0.4));
}

/* SVG */
#tv svg {
  width:100%;
  height:auto;
  display:block;
}

/* SCREEN LAYER (VIDEO) */
#screen {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-55%);
  width:42%;
  height:42%;
  border-radius:50%;
  overflow:hidden;
  z-index:1;
}

/* VIDEO */
video {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CRT SCANLINES */
#screen::after {
  content:'';
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    to bottom,
    rgba(0,0,0,0.15),
    rgba(0,0,0,0.15) 1px,
    transparent 2px,
    transparent 4px
  );
  pointer-events:none;
  opacity:0.35;
}

/* BUTTON */
#btn {
  position:absolute;
  bottom:18%;
  left:50%;
  transform:translateX(-50%);
  width:38px;
  height:38px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #ffb3df, #7a2b60);
  box-shadow:
    0 5px 10px rgba(0,0,0,0.5),
    inset 0 2px 6px rgba(255,255,255,0.2);
  cursor:pointer;
}

#btn:active {
  transform:translateX(-50%) translateY(2px);
}

/* IDLE TEXT */
#idle {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:12px;
  letter-spacing:0.3em;
  color:rgba(255,180,220,0.4);
  pointer-events:none;
}

.hidden { opacity:0; }
</style>
</head>

<body>

<div class="hint" id="hint">drag tv · click to play/pause</div>

<div id="tv">

  <!-- VIDEO SCREEN -->
  <div id="screen">
    <video id="vid" loop playsinline preload="auto">
      <source src="The Powerpuff Girls.mp4" type="video/mp4">
    </video>

    <div id="idle">NO SIGNAL</div>
  </div>

  <!-- YOUR TV SVG -->
  <object data="TV.svg" type="image/svg+xml"></object>

  <!-- BUTTON -->
  <div id="btn"></div>

</div>

<script>
const tv = document.getElementById('tv');
const vid = document.getElementById('vid');
const btn = document.getElementById('btn');
const idle = document.getElementById('idle');
const hint = document.getElementById('hint');

let playing = false;

/* ---------------- PLAY / PAUSE ---------------- */
async function toggle() {

  if (!playing) {
    try {
      vid.muted = false;          // ensure sound ON
      await vid.play();          // must be user triggered

      playing = true;

      idle.classList.add('hidden');
      tv.classList.add('playing');

    } catch (err) {
      console.log("Playback blocked:", err);
    }

  } else {
    vid.pause();
    playing = false;

    idle.classList.remove('hidden');
    tv.classList.remove('playing');
  }
}

/* BUTTON + SCREEN CLICK */
btn.addEventListener('click', toggle);
document.getElementById('screen').addEventListener('click', toggle);

/* ---------------- DRAG ---------------- */
let dragging = false;
let offsetX, offsetY;

let x = window.innerWidth/2;
let y = window.innerHeight/2;

function setPos(nx, ny) {
  x = nx;
  y = ny;

  tv.style.left = x + 'px';
  tv.style.top = y + 'px';
  tv.style.transform = 'translate(-50%,-50%)';
}

setPos(x,y);

tv.addEventListener('mousedown', (e) => {
  if (e.target === btn) return;

  dragging = true;
  offsetX = e.clientX - x;
  offsetY = e.clientY - y;
});

window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  setPos(e.clientX - offsetX, e.clientY - offsetY);
  hint.classList.add('hidden');
});

window.addEventListener('mouseup', () => dragging = false);

/* TOUCH SUPPORT */
tv.addEventListener('touchstart', (e) => {
  if (e.target === btn) return;

  const t = e.touches[0];
  dragging = true;
  offsetX = t.clientX - x;
  offsetY = t.clientY - y;
},{passive:false});

window.addEventListener('touchmove', (e) => {
  if (!dragging) return;

  const t = e.touches[0];
  setPos(t.clientX - offsetX, t.clientY - offsetY);
},{passive:false});

window.addEventListener('touchend', () => dragging = false);

/* HINT FADE */
setTimeout(() => hint.classList.add('hidden'), 4000);

</script>

</body>
</html>
