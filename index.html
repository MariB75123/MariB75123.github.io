<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Whimsical River Valley</title>

<style>
    html, body {
        margin: 0;
        overflow: hidden;
        height: 100%;
        background: #a8d4ff;
        font-family: 'Segoe UI', Arial, sans-serif;
    }

    canvas {
        display: block;
    }

    .title {
        position: absolute;
        top: 35px;
        width: 100%;
        text-align: center;
        color: #fff;
        font-size: 2.8rem;
        letter-spacing: 12px;
        pointer-events: none;
        text-shadow: 
            0 3px 15px rgba(0,0,0,0.4),
            0 0 40px rgba(180, 230, 255, 0.9);
        z-index: 10;
        font-weight: 300;
    }
</style>
</head>
<body>

<div class="title">WHIMSICAL RIVER</div>
<canvas id="scene"></canvas>

<script>
const canvas = document.getElementById("scene");
const ctx = canvas.getContext("2d");

let w, h, time = 0;

const mountains = [];
const trees = [];
const clouds = [];
const birds = [];
const fireflies = [];
const ripples = [];

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    
    generateMountains();
    generateTrees();
    generateClouds();
    generateBirds();
    generateFireflies();
}

window.addEventListener("resize", resize);

// ===================== GENERATORS =====================

function generateMountains() {
    mountains.length = 0;
    for (let x = -150; x < w + 200; x += 95) {
        mountains.push({
            x: x,
            peak: h * 0.28 + Math.random() * 110
        });
    }
}

function generateTrees() {
    trees.length = 0;
    for (let i = 0; i < 160; i++) {
        trees.push({
            x: Math.random() * w,
            y: h * 0.55 + Math.random() * 130,
            size: 28 + Math.random() * 55,
            sway: Math.random() * Math.PI * 2
        });
    }
}

function generateClouds() {
    clouds.length = 0;
    for (let i = 0; i < 9; i++) {
        clouds.push({
            x: Math.random() * w,
            y: h * 0.12 + Math.random() * 110,
            size: 110 + Math.random() * 160,
            speed: 0.04 + Math.random() * 0.1
        });
    }
}

function generateBirds() {
    birds.length = 0;
    for (let i = 0; i < 7; i++) {
        birds.push({
            x: Math.random() * w,
            y: 90 + Math.random() * 160,
            speed: 1.2 + Math.random() * 1.3
        });
    }
}

function generateFireflies() {
    fireflies.length = 0;
    for (let i = 0; i < 25; i++) {
        fireflies.push({
            x: Math.random() * w,
            y: h * 0.6 + Math.random() * (h * 0.35),
            size: 3 + Math.random() * 3,
            speedX: (Math.random() - 0.5) * 1.2,
            speedY: (Math.random() - 0.5) * 1.2,
            phase: Math.random() * Math.PI * 2
        });
    }
}

resize();

// ===================== DRAW FUNCTIONS =====================

function drawSky() {
    const grad = ctx.createLinearGradient(0, 0, 0, h * 0.75);
    grad.addColorStop(0, "#7cc6ff");
    grad.addColorStop(0.45, "#b0e0ff");
    grad.addColorStop(0.8, "#ffe8c4");
    grad.addColorStop(1, "#fff7d9");

    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    // Soft sun
    ctx.save();
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = "#fff7b8";
    ctx.beginPath();
    ctx.arc(w * 0.75, h * 0.22, 95, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.fillStyle = "#fff9c4";
    ctx.beginPath();
    ctx.arc(w * 0.75, h * 0.22, 48, 0, Math.PI * 2);
    ctx.fill();
}

function drawClouds() {
    ctx.fillStyle = "rgba(255,255,255,0.95)";
    for (const c of clouds) {
        const y = c.y + Math.sin(time * 0.0008) * 8;

        for (let i = 0; i < 6; i++) {
            ctx.beginPath();
            ctx.ellipse(
                c.x + i * c.size * 0.22,
                y + Math.sin(i) * 18,
                c.size * 0.42,
                c.size * 0.28,
                0, 0, Math.PI * 2
            );
            ctx.fill();
        }

        c.x += c.speed;
        if (c.x > w + 500) c.x = -500;
    }
}

function drawMountains() {
    ctx.strokeStyle = "#5a8a9e";
    ctx.lineWidth = 4;

    // Back mountains
    ctx.fillStyle = "#6ba8b8";
    ctx.beginPath();
    ctx.moveTo(0, h * 0.65);
    for (const m of mountains) {
        ctx.lineTo(m.x, m.peak);
    }
    ctx.lineTo(w, h * 0.68);
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.fill();

    // Highlight lines
    ctx.beginPath();
    for (const m of mountains) {
        ctx.moveTo(m.x - 35, m.peak + 45);
        ctx.lineTo(m.x + 40, m.peak - 25);
    }
    ctx.stroke();
}

function drawTrees() {
    for (const t of trees) {
        const sway = Math.sin(time * 0.0018 + t.sway) * 3.5;

        // Trunk
        ctx.fillStyle = "#3d2b1f";
        ctx.fillRect(t.x + sway * 0.4, t.y, t.size * 0.13, t.size * 1.1);

        // Foliage
        const colors = ["#5cb85c", "#4a9c4a", "#3d8a3d"];
        
        for (let i = 0; i < 4; i++) {
            ctx.fillStyle = colors[i % 3];
            ctx.beginPath();
            ctx.ellipse(
                t.x + sway * (0.8 - i * 0.2) + t.size * 0.06,
                t.y - i * t.size * 0.38,
                t.size * (0.72 - i * 0.13),
                t.size * (0.48 - i * 0.08),
                0, 0, Math.PI * 2
            );
            ctx.fill();
        }
    }
}

function drawRiver() {
    const top = h * 0.62;

    const river = ctx.createLinearGradient(0, top, 0, h);
    river.addColorStop(0, "#6ed3ff");
    river.addColorStop(0.5, "#4a9eff");
    river.addColorStop(1, "#1e5ab8");

    ctx.fillStyle = river;
    ctx.beginPath();
    ctx.moveTo(0, top);

    for (let x = 0; x <= w; x += 12) {
        const wave = Math.sin(x * 0.007 + time * 0.0022) * 22 +
                     Math.cos(x * 0.022 + time * 0.0018) * 11;
        ctx.lineTo(x, top + wave);
    }

    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.fill();

    // Sparkling highlights
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    for (let i = 0; i < 55; i++) {
        const x = Math.random() * w;
        const y = top + Math.random() * (h - top);
        ctx.fillRect(x, y, 38 + Math.random() * 45, 1.8);
    }
}

function drawBirds() {
    ctx.strokeStyle = "#2c3e50";
    ctx.lineWidth = 2.5;

    for (const b of birds) {
        const flap = Math.sin(time * 0.012) * 7;
        ctx.beginPath();
        ctx.moveTo(b.x, b.y);
        ctx.quadraticCurveTo(b.x + 18, b.y - 12 + flap, b.x + 42, b.y + flap * 0.6);
        ctx.stroke();

        b.x += b.speed;
        if (b.x > w + 100) b.x = -100;
    }
}

function drawFireflies() {
    for (const f of fireflies) {
        const pulse = Math.sin(time * 0.008 + f.phase) * 0.5 + 0.8;

        ctx.fillStyle = `rgba(255, 245, 120, ${pulse})`;
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.size * pulse, 0, Math.PI * 2);
        ctx.fill();

        // Glow
        ctx.fillStyle = `rgba(255, 255, 180, ${pulse * 0.3})`;
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.size * 3.5, 0, Math.PI * 2);
        ctx.fill();

        // Movement
        f.x += f.speedX;
        f.y += f.speedY;

        if (Math.random() < 0.03) {
            f.speedX = (Math.random() - 0.5) * 2.5;
            f.speedY = (Math.random() - 0.5) * 2.5;
        }

        // Keep in bounds
        if (f.x < 0 || f.x > w) f.speedX *= -1;
        if (f.y < h * 0.5 || f.y > h) f.speedY *= -1;
    }
}

function drawRipples() {
    for (let i = ripples.length - 1; i >= 0; i--) {
        const r = ripples[i];
        ctx.strokeStyle = `rgba(255,255,255,${r.alpha})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(r.x, r.y, r.r * 2, r.r * 0.6, 0, 0, Math.PI * 2);
        ctx.stroke();

        r.r += 0.8;
        r.alpha -= 0.018;

        if (r.alpha <= 0) ripples.splice(i, 1);
    }
}

function createRipple() {
    if (Math.random() < 0.35) {
        ripples.push({
            x: Math.random() * w,
            y: h * 0.65 + Math.random() * (h * 0.3),
            r: 5,
            alpha: 0.45
        });
    }
}

// ===================== ANIMATION =====================

function animate(t) {
    time = t;
    ctx.clearRect(0, 0, w, h);

    drawSky();
    drawClouds();
    drawMountains();
    drawTrees();
    drawRiver();
    drawBirds();
    drawFireflies();
    drawRipples();
    createRipple();

    requestAnimationFrame(animate);
}

animate(0);
</script>

</body>
</html>
