<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Powerpuff TV</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;

    /* SMALLER BACKGROUND SCALE */
    background:
        url("Wallpaper.jpeg")
        center center / contain
        no-repeat fixed;

    background-color:black;
}

/* TV CONTAINER */

#tvContainer{
    position:absolute;

    width:650px;
    max-width:90vw;

    left:50%;
    top:50%;

    transform:translate(-50%, -50%);
    z-index:10;

    cursor:grab;

    animation:float 4s ease-in-out infinite;
}

#tvContainer:active{
    cursor:grabbing;
}

/* TV IMAGE */

#tvFrame{
    width:100%;
    position:relative;
    z-index:2;

    pointer-events:none;

    filter:drop-shadow(0 10px 20px rgba(0,0,0,0.4));
}

/* VIDEO OVERLAY */

#videoWrapper{
    position:absolute;

    /* ADJUST THESE */
    left:18%;
    top:16.5%;
    width:47%;
    height:41%;

    border-radius:50%;
    overflow:hidden;

    z-index:5;
}

#tvVideo{
    width:100%;
    height:100%;
    object-fit:cover;

    border-radius:50%;

    filter:
        contrast(1.05)
        saturate(1.05);
}

/* BUTTONS */

.tvButton{
    position:absolute;
    border-radius:50%;
    z-index:20;
    cursor:pointer;
}

/* POWER */

#powerBtn{
    width:50px;
    height:50px;

    right:14%;
    top:38%;
}

/* PLAY */

#playBtn{
    width:50px;
    height:50px;

    right:14%;
    top:50%;
}

/* FLOATING */

@keyframes float{
    0%{
        transform:translate(-50%, -50%) translateY(0px);
    }

    50%{
        transform:translate(-50%, -50%) translateY(-6px);
    }

    100%{
        transform:translate(-50%, -50%) translateY(0px);
    }
}

@media(max-width:768px){

    body{
        background-size:cover;
    }

    #tvContainer{
        width:95vw;
    }

    #powerBtn,
    #playBtn{
        width:40px;
        height:40px;
    }
}

</style>
</head>

<body>

<div id="tvContainer">

    <!-- TV IMAGE -->
    <img src="TV.png" id="tvFrame">

    <!-- VIDEO ON TOP -->
    <div id="videoWrapper">

        <video
            id="tvVideo"
            autoplay
            muted
            loop
            playsinline
        >
            <source src="The Powerpuff Girls.mp4" type="video/mp4">
        </video>

    </div>

    <!-- BUTTONS -->

    <div class="tvButton" id="powerBtn"></div>
    <div class="tvButton" id="playBtn"></div>

</div>

<script>

const tv = document.getElementById("tvContainer");
const video = document.getElementById("tvVideo");

/* -------------------- */
/* DRAGGING */
/* -------------------- */

let isDragging = false;
let offsetX, offsetY;

tv.addEventListener("mousedown", (e)=>{

    isDragging = true;

    offsetX = e.clientX - tv.offsetLeft;
    offsetY = e.clientY - tv.offsetTop;

    tv.style.animation = "none";
});

document.addEventListener("mousemove", (e)=>{

    if(!isDragging) return;

    tv.style.left = `${e.clientX - offsetX}px`;
    tv.style.top = `${e.clientY - offsetY}px`;

    tv.style.transform = "translate(0,0)";
});

document.addEventListener("mouseup", ()=>{

    isDragging = false;
});

/* TOUCH */

tv.addEventListener("touchstart", (e)=>{

    isDragging = true;

    offsetX = e.touches[0].clientX - tv.offsetLeft;
    offsetY = e.touches[0].clientY - tv.offsetTop;

    tv.style.animation = "none";

}, { passive:true });

document.addEventListener("touchmove", (e)=>{

    if(!isDragging) return;

    tv.style.left = `${e.touches[0].clientX - offsetX}px`;
    tv.style.top = `${e.touches[0].clientY - offsetY}px`;

    tv.style.transform = "translate(0,0)";

}, { passive:true });

document.addEventListener("touchend", ()=>{

    isDragging = false;
});

/* -------------------- */
/* POWER BUTTON */
/* -------------------- */

const powerBtn = document.getElementById("powerBtn");

let power = true;

powerBtn.addEventListener("click", ()=>{

    power = !power;

    if(power){

        video.style.opacity = "1";
        video.play();

    }else{

        video.pause();
        video.style.opacity = "0";
    }
});

/* -------------------- */
/* PLAY / PAUSE */
/* -------------------- */

const playBtn = document.getElementById("playBtn");

playBtn.addEventListener("click", ()=>{

    if(video.paused){

        video.play();

    }else{

        video.pause();
    }
});

</script>

</body>
</html>
