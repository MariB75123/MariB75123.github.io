<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Powerpuff TV</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;

    background:
        url("Wallpaper.jpeg")
        center center / contain
        no-repeat fixed;

    background-color:black;
}

/* TV CONTAINER */

#tvContainer{
    position:absolute;

    width:900px;
    max-width:95vw;

    left:50%;
    top:50%;

    transform:translate(-50%, -50%);

    cursor:grab;

    animation:float 4s ease-in-out infinite;
}

/* TV IMAGE */

#tvFrame{
    width:100%;
    display:block;

    position:relative;
    z-index:5;

    pointer-events:none;

    filter:drop-shadow(0 10px 20px rgba(0,0,0,0.4));
}

/* VIDEO SCREEN */
/* EXACT SIZE + CENTERED INSIDE PURPLE CIRCLE */

#videoWrapper{
    position:absolute;

    width:236px;
    height:229px;

    /* EXACT COORDINATES */

    left:306px;
    top:211px;

    /* KEEP VIDEO INSIDE CIRCLE */
    border-radius:50%;

    overflow:hidden;

    z-index:2;

    /* invisible helper layer */
    background:transparent;
}

/* VIDEO */

#tvVideo{
    width:100%;
    height:100%;

    object-fit:cover;

    border-radius:50%;

    /* prevents touching outer edge */
    transform:scale(0.88);

    filter:
        contrast(1.05)
        saturate(1.05);
}

/* BUTTONS */

.tvButton{
    position:absolute;
    border-radius:50%;
    z-index:20;
    cursor:pointer;
}

/* POWER BUTTON */

#powerBtn{
    width:50px;
    height:50px;

    right:120px;
    top:340px;
}

/* PLAY BUTTON */

#playBtn{
    width:50px;
    height:50px;

    right:120px;
    top:440px;
}

/* FLOAT */

@keyframes float{

    0%{
        transform:translate(-50%, -50%) translateY(0px);
    }

    50%{
        transform:translate(-50%, -50%) translateY(-6px);
    }

    100%{
        transform:translate(-50%, -50%) translateY(0px);
    }
}

/* MOBILE */

@media(max-width:768px){

    body{
        background-size:cover;
    }

    #tvContainer{
        width:95vw;
    }

    #videoWrapper{

        width:25vw;
        height:24vw;

        left:34vw;
        top:23vw;
    }
}

</style>
</head>

<body>

<div id="tvContainer">

    <!-- VIDEO INSIDE TV SCREEN LAYER -->
    <div id="videoWrapper">

        <video
            id="tvVideo"
            autoplay
            muted
            loop
            playsinline
        >
            <source src="The Powerpuff Girls.mp4" type="video/mp4">
        </video>

    </div>

    <!-- TV FRAME ABOVE VIDEO -->
    <img src="TV2.png" id="tvFrame">

    <!-- BUTTONS -->
    <div class="tvButton" id="powerBtn"></div>
    <div class="tvButton" id="playBtn"></div>

</div>

<script>

const tv = document.getElementById("tvContainer");
const video = document.getElementById("tvVideo");

/* DRAGGING */

let dragging = false;
let offsetX = 0;
let offsetY = 0;

tv.addEventListener("mousedown", (e)=>{

    dragging = true;

    offsetX = e.clientX - tv.offsetLeft;
    offsetY = e.clientY - tv.offsetTop;

    tv.style.animation = "none";
});

document.addEventListener("mousemove", (e)=>{

    if(!dragging) return;

    tv.style.left = `${e.clientX - offsetX}px`;
    tv.style.top = `${e.clientY - offsetY}px`;

    tv.style.transform = "translate(0,0)";
});

document.addEventListener("mouseup", ()=>{

    dragging = false;
});

/* TOUCH */

tv.addEventListener("touchstart", (e)=>{

    dragging = true;

    offsetX = e.touches[0].clientX - tv.offsetLeft;
    offsetY = e.touches[0].clientY - tv.offsetTop;

}, { passive:true });

document.addEventListener("touchmove", (e)=>{

    if(!dragging) return;

    tv.style.left = `${e.touches[0].clientX - offsetX}px`;
    tv.style.top = `${e.touches[0].clientY - offsetY}px`;

    tv.style.transform = "translate(0,0)";

}, { passive:true });

document.addEventListener("touchend", ()=>{

    dragging = false;
});

/* POWER BUTTON */

const powerBtn = document.getElementById("powerBtn");

let power = true;

powerBtn.addEventListener("click", ()=>{

    power = !power;

    if(power){

        video.style.opacity = "1";
        video.play();

    }else{

        video.pause();
        video.style.opacity = "0";
    }
});

/* PLAY / PAUSE */

const playBtn = document.getElementById("playBtn");

playBtn.addEventListener("click", ()=>{

    if(video.paused){

        video.play();

    }else{

        video.pause();
    }
});

</script>

</body>
</html>
